name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # === ПОВТОРЯЕМ ПРОВЕРКИ ИЗ CI ===
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: PHP syntax check
        run: find src -name "*.php" -print0 | xargs -0 -n1 php -l 2>/dev/null || true
      
      - name: Python syntax check
        run: python -m compileall boardy-api/ -q 2>/dev/null || true

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .env for CI
        run: |
          cat << EOF > .env
          MYSQL_ROOT_PASSWORD=root_password
          MYSQL_DATABASE=boardy_laravel
          MYSQL_USER=boardy
          MYSQL_PASSWORD=boardy_password
          DB_HOST=mysql
          DB_DATABASE=boardy_laravel
          DB_USERNAME=boardy
          DB_PASSWORD=boardy_password
          REDIS_HOST=redis
          EOF
          mkdir -p src/boardy-laravel
          cp .env src/boardy-laravel/.env
      
      - name: Build images
        run: docker compose build
      
      - name: Start stack
        run: |
          docker compose up -d
          for i in {1..30}; do
            curl -fs http://localhost/health-laravel && break
            sleep 2
          done
      
      - name: Smoke endpoints
        run: |
          curl -f http://localhost/health-laravel
          curl -f http://localhost/api/health
      
      - name: Tear down
        if: always()
        run: docker compose down -v

  test:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      
      - name: Install PHP deps
        working-directory: ./src/boardy-laravel
        run: composer install --no-interaction --prefer-dist
      
      - name: Generate Laravel App Key
        working-directory: ./src/boardy-laravel
        run: |
          cp .env.example .env 2>/dev/null || touch .env
          php artisan key:generate
      
      - name: Run PHPUnit
        working-directory: ./src/boardy-laravel
        run: php artisan test --filter=HealthTest
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python deps
        working-directory: ./boardy-api
        run: pip install -r requirements.txt pytest httpx
      
      - name: Run pytest
        working-directory: ./boardy-api
        run: pytest tests/test_health.py -v

  # === СБОРКА ОБРАЗОВ В GHCR ===
  build:
    runs-on: ubuntu-latest
    needs: [lint, smoke, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build & push PHP image
        uses: docker/build-push-action@v5
        with:
          context: ./src/boardy-laravel
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-php:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-php:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build & push FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: ./boardy-api
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # === ДЕПЛОЙ НА СЕРВЕР ЧЕРЕЗ SSH ===
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/boardy
            echo "=== Pulling latest images from GHCR ==="
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            echo "=== Starting containers ==="
            docker compose up -d
            echo "=== Cleaning up old images ==="
            docker image prune -f
            echo "=== Deployment complete ==="
