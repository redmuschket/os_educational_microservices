name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: PHP syntax check
        run: find src -name "*.php" -print0 | xargs -0 -n1 php -l 2>/dev/null || true
      
      - name: Python syntax check
        run: python -m compileall api/ -q 2>/dev/null || true

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env 2>/dev/null || touch .env
          mkdir -p src/boardy-laravel
          touch src/boardy-laravel/.env      

      - name: Build images
        run: docker compose build
      
      - name: Start stack
        run: |
          docker compose up -d
          for i in {1..30}; do
            curl -fs http://localhost/health-laravel && break
            sleep 2
          done
      
      - name: Smoke endpoints
        run: |
          curl -f http://localhost/health-laravel
          curl -f http://localhost/api/health
      
      - name: Tear down
        if: always()
        run: docker compose down -v

  test:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      
      # PHP/Laravel
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      
      - name: Install PHP deps
        working-directory: ./src
        run: composer install --no-interaction --prefer-dist
      
      - name: Run PHPUnit
        working-directory: ./src
        run: php artisan test --filter=HealthTest
      
      # Python/FastAPI
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python deps
        run: |
          pip install -r api/requirements.txt pytest
          pip install "httpx<0.28.0"
      
      - name: Run pytest
        working-directory: ./api
        run: PYTHONPATH=/app pytest tests/test_health.py -v
