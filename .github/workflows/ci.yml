name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP syntax check
        run: find src -name "*.php" -print0 | xargs -0 -n1 php -l 2>/dev/null || true
      - name: Python syntax check
        run: python -m compileall boardy-api/ -q 2>/dev/null || true

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          MYSQL_ROOT_PASSWORD=root_password
          MYSQL_DATABASE=boardy_laravel
          MYSQL_USER=boardy
          MYSQL_PASSWORD=boardy_password
          ENVEOF
      - name: Build
        run: docker compose build
      - name: Start
        run: docker compose up -d
      - name: Wait
        run: sleep 15
      - name: Smoke test
        run: curl -f http://localhost/health-laravel
      - name: Stop
        if: always()
        run: docker compose down -v

  test:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install deps
        working-directory: ./src/boardy-laravel
        run: composer install --no-interaction
      - name: Run PHPUnit
        working-directory: ./src/boardy-laravel
        run: php artisan test --filter=HealthTest
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        working-directory: ./boardy-api
        run: pip install -r requirements.txt pytest
      - name: Run pytest
        working-directory: ./boardy-api
        run: pytest tests/test_health.py -v
